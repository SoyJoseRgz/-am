services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-miresto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-miresto}
      POSTGRES_DB: ${DB_NAME:-miresto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-miresto}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${DB_USER:-miresto}:${DB_PASSWORD:-miresto}@postgres:5432/${DB_NAME:-miresto}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      FOTOS_DIR: /var/www/fotos
      NODE_ENV: production
    volumes:
      - fotos:/var/www/fotos
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    volumes:
      - fotos:/var/www/fotos:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  fotos:
